services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports: ["6333:6333", "6334:6334"]

  ollama:
    profiles: ["llm"]
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama

  langfuse:
    profiles: ["observability"]
    image: langfuse/langfuse:2
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgres://rag:rag@postgres:5432/langfuse
      NEXTAUTH_SECRET: local-only-dev-secret
      SALT: local-only-dev-salt
      NEXTAUTH_URL: http://localhost:3000
    depends_on: [postgres]

  airflow:
    profiles: ["airflow"]
    image: apache/airflow:2.9.3-python3.11
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://rag:rag@postgres:5432/rag
    ports: ["8080:8080"]
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
    depends_on: [postgres]
    command: standalone

volumes:
  ollama_data:
